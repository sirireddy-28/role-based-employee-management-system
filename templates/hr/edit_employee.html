{% extends "base.html" %}
{% block title %}Edit Employee (HR){% endblock %}
{% block page_title %}Update Employee Info{% endblock %}

{% block content %}
<div class="page-header fade-in">
  <div class="d-flex align-items-center gap-3">
    <a href="{{ url_for('hr_employees') }}" class="btn-sm-icon btn-view">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div>
      <h2>Update Employee Info</h2>
      <p>Editing record for <strong style="color:var(--accent-teal-light);">{{ employee.name }}</strong></p>
    </div>
  </div>
</div>

<div class="content-card" style="max-width:600px;">
  <div class="card-header-custom">
    <div class="card-title-custom">
      <div class="title-icon"><i class="bi bi-pencil-fill"></i></div>
      Contact & Work Info
    </div>
  </div>

  <form method="POST" action="{{ url_for('hr_edit_employee', emp_id=employee.id) }}">
    <div class="row g-3 mb-4">
      <div class="col-12">
        <label class="form-label" for="phone">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
          <input type="tel" id="phone" name="phone" class="form-control" value="{{ employee.phone or '' }}" placeholder="+91 98765 43210">
        </div>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="department">Department</label>
        <select id="department" name="department" class="form-select">
          <option value="">-- Select --</option>
          {% for dept in ['Engineering','Human Resources','Finance','Marketing','Sales','Operations','Administration','IT Support'] %}
          <option value="{{ dept }}" {% if employee.department == dept %}selected{% endif %}>{{ dept }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="designation">Designation</label>
        <input type="text" id="designation" name="designation" class="form-control" value="{{ employee.designation or '' }}" placeholder="e.g. Software Engineer">
      </div>
    </div>

    <div class="d-flex gap-3">
      <button type="submit" class="btn-accent">
        <i class="bi bi-check-lg me-2"></i>Update Record
      </button>
      <a href="{{ url_for('hr_employees') }}" class="btn-outline-custom" style="text-decoration:none; display:inline-flex; align-items:center;">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
